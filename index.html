<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>面試駕駛艙</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif; }
    #lock {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: radial-gradient(circle at 30% 20%, rgba(249,115,22,0.08), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(56,189,248,0.06), transparent 50%),
                  #0f172a;
    }
    .lock-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 18px;
      padding: 36px 32px 28px; max-width: 360px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .lock-icon { font-size: 36px; margin-bottom: 12px; }
    .lock-title { font-size: 20px; font-weight: 700; color: #f1f5f9; margin: 0 0 6px; }
    .lock-sub { color: #94a3b8; font-size: 13px; margin: 0 0 24px; line-height: 1.5; }
    #pw {
      width: 100%; padding: 14px 16px; font-size: 22px; text-align: center;
      background: #0f172a; color: #f1f5f9; border: 1px solid #334155; border-radius: 12px;
      outline: none; letter-spacing: 8px; font-family: inherit;
      transition: border-color .15s;
    }
    #pw:focus { border-color: #38bdf8; }
    #pw::placeholder { color: #475569; letter-spacing: 4px; font-size: 14px; }
    #err {
      color: #f87171; margin-top: 14px; font-size: 13px; height: 18px;
      transition: opacity .2s;
    }
    .footer { color: #475569; font-size: 11px; margin-top: 20px; }
    #content { display: none; border: 0; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
  <div id="lock">
    <div class="lock-card">
      <div class="lock-icon">🔐</div>
      <h1 class="lock-title">面試駕駛艙</h1>
      <p class="lock-sub">Interview Cockpit · Private</p>
      <input type="password" id="pw" autocomplete="off" inputmode="numeric" placeholder="輸入密碼" autofocus>
      <div id="err"></div>
      <div class="footer">Encrypted · AES-256-GCM</div>
    </div>
  </div>

    async function decrypt(password) {
      const bin = Uint8Array.from(atob(ENC), c => c.charCodeAt(0));
      const salt = bin.slice(0, 16);
      const iv = bin.slice(16, 28);
      const ct = bin.slice(28); // ciphertext + authTag (Web Crypto format)
      const enc = new TextEncoder();
      const keyMat = await crypto.subtle.importKey(
        "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
      );
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMat,
        { name: "AES-GCM", length: 256 },
        false, ["decrypt"]
      );
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
      return new TextDecoder().decode(plain);
    }

    const pw = document.getElementById('pw');
    const err = document.getElementById('err');
    let attempting = false;

    async function attempt() {
      if (attempting) return;
      const password = pw.value.trim();
      if (!password) return;
      attempting = true;
      err.textContent = '驗證中…';
      err.style.color = '#94a3b8';
      try {
        const html = await decrypt(password);
        // Cache in sessionStorage so refresh during session doesn't re-prompt
        try { sessionStorage.setItem('mw_cache', html); } catch(e) {}
        showContent(html);
      } catch (e) {
        err.textContent = '密碼錯誤';
        err.style.color = '#f87171';
        pw.value = '';
        pw.focus();
        attempting = false;
      }
    }

    function showContent(html) {
      document.getElementById('lock').style.display = 'none';
      const iframe = document.getElementById('content');
      iframe.style.display = 'block';
      iframe.srcdoc = html;
    }

    // Auto-restore if previously unlocked this session
    try {
      const cached = sessionStorage.getItem('mw_cache');
      if (cached) { showContent(cached); }
    } catch(e) {}

    pw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') attempt();
    });
  </script>
